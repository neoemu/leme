name: Leme
options:
  bundleIdPrefix: com.leme
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "26.0"

packages:
  SwiftkubeClient:
    url: https://github.com/swiftkube/client.git
    from: "0.17.0"
  SwiftkubeModel:
    url: https://github.com/swiftkube/model.git
    from: "0.14.0"
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: "5.1.3"
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.2.8"
  CodeEditor:
    url: https://github.com/ZeeZide/CodeEditor.git
    from: "1.2.6"

# Shared scheme so xcodebuild works on clean checkouts (CI): without it the
# scheme only exists in local xcuserdata created by the Xcode GUI.
schemes:
  Leme:
    build:
      targets:
        Leme: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LemeTests
    archive:
      config: Release

targets:
  Leme:
    type: application
    platform: macOS
    sources:
      - path: Leme
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.leme.app
        PRODUCT_NAME: Leme
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: NO
    dependencies:
      - package: SwiftkubeClient
      - package: SwiftkubeModel
      - package: Yams
      - package: SwiftTerm
      - package: CodeEditor
    entitlements:
      path: Leme/Leme.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true

  LemeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: LemeTests
    dependencies:
      - target: Leme
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.leme.tests
        GENERATE_INFOPLIST_FILE: YES

  LemeUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: LemeUITests
    dependencies:
      - target: Leme
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.leme.uitests
        GENERATE_INFOPLIST_FILE: YES
