name: Klaro
options:
  bundleIdPrefix: com.klaro
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "15.0"

packages:
  SwiftkubeClient:
    url: https://github.com/swiftkube/client.git
    from: "0.17.0"
  SwiftkubeModel:
    url: https://github.com/swiftkube/model.git
    from: "0.14.0"
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: "5.1.3"
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.2.8"
  CodeEditor:
    url: https://github.com/ZeeZide/CodeEditor.git
    from: "1.2.6"

targets:
  Klaro:
    type: application
    platform: macOS
    sources:
      - path: Klaro
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.klaro.app
        PRODUCT_NAME: Klaro
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        ENABLE_APP_SANDBOX: NO
    dependencies:
      - package: SwiftkubeClient
      - package: SwiftkubeModel
      - package: Yams
      - package: SwiftTerm
      - package: CodeEditor
    entitlements:
      path: Klaro/Klaro.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true

  KlaroTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: KlaroTests
    dependencies:
      - target: Klaro
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.klaro.tests

  KlaroUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: KlaroUITests
    dependencies:
      - target: Klaro
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.klaro.uitests
